name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend-Abhängigkeiten installieren
        working-directory: frontend
        run: npm ci

      - name: Frontend bauen
        working-directory: frontend
        env:
          VITE_API_URL: https://schoolwork-backend.jonathanrontgen7.workers.dev
        run: npm run build

      - name: Capacitor iOS-Plattform hinzufügen
        working-directory: frontend
        run: npx cap add ios || true

      - name: Web-Assets in iOS-Projekt kopieren
        working-directory: frontend
        run: npx cap copy ios

      - name: CocoaPods installieren
        working-directory: frontend/ios/App
        run: pod install

      - name: Unsigned iOS App archivieren
        working-directory: frontend/ios
        run: |
          xcodebuild \
            -workspace App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO

      - name: IPA aus Archiv erstellen
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/App.xcarchive/Products/Applications/App.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r SchoolWork.ipa Payload
          echo "IPA erstellt: $RUNNER_TEMP/SchoolWork.ipa"

      - name: IPA hochladen
        uses: actions/upload-artifact@v4
        with:
          name: SchoolWork-iOS
          path: ${{ runner.temp }}/SchoolWork.ipa
          retention-days: 30
